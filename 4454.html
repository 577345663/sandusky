function goBack(){

    renderHome();
    return;
  }
}

function showSplash(){
  let last=localStorage.getItem("splashTime");
  let now=Date.now();
  if(!last||(now-last)>9999*1000){
    splash.style.display="flex";
    localStorage.setItem("splashTime",now);
  }
}
function closeSplash(){splash.style.display="none";}

function mapLink(addr){
  return /iPhone|iPad|iPod/i.test(navigator.userAgent)
    ? `http://maps.apple.com/?q=${encodeURIComponent(addr)}`
    : `https://maps.google.com/?q=${encodeURIComponent(addr)}`;
}

function shortUrl(url){
  if(!url)return "";
  let clean=url.replace(/^https?:\/\//,"").replace(/^www\./,"");
  return clean.length>32 ? clean.slice(0,32)+"…" : clean;
}

function updateZips(){
  activeZips=[...document.querySelectorAll('#zipBox input:checked')].map(x=>x.value);

function checkAll(){
  document.querySelectorAll('#zipBox input').forEach(x=>x.checked=true);

}
function clearAll(){
  document.querySelectorAll('#zipBox input').forEach(x=>x.checked=false);

}

function passFilters(p){
  let inZip=activeZips.includes(p.z);
  let includeSur=document.getElementById("surrounding").checked;
  if(p.co!=="Erie"&&!includeSur)return false;
  return inZip;
}

function renderHome(){
  currentView={level:0,cat:null,sub:null};
  content.innerHTML=`<div class="grid">${
    cats.map(c=>`
<div class="tile" onclick="openCat('${c[1]}')" style="background-image:url('${c[2]||`images/categories/${c[1]}.jpg`}')">
<div class="label">${c[0]}</div>
</div>`).join("")}</div>`;
}

function openCat(cat){
  currentView={level:1,cat,sub:null};

  if(subcatDefs[cat]){
    let def=subcatDefs[cat];
    content.innerHTML=`<div class="grid">${
      def.items.map(s=>{
        let label=s[0];
        let key=s[1];
        let img=s[2]||`images/${def.folder}/${key}.jpg`;
        return `<div class="tile" onclick="openList('${cat}','${key}')" style="background-image:url('${img}')">
<div class="label">${label}</div>
</div>`;
      }).join("")}</div>`;
    return;
  }

  openList(cat);
}

function openList(cat,sub,forcedItems){
  if(!forcedItems){
    currentView={level:sub?2:1,cat,sub:sub||null};
  }

  let items=forcedItems
    ? forcedItems.filter(passFilters)
    : (cat==="favorites"
      ? places.filter(p=>p.featured&&p.c!=="about")
      : places.filter(p=>sub?(p.c===cat&&p.s===sub):p.c===cat)
    ).filter(passFilters);

  let matches=[];
  if(!forcedItems){
    let targets=[cat];
    if(sub){targets.push(sub);}
    matches=announcements.filter(a=>a.active&&a.targets.some(t=>targets.includes(t))).slice(0,1);
  }

  let featured=items.filter(p=>p.featured).sort((a,b)=>a.n.localeCompare(b.n));
  let normal=items.filter(p=>!p.featured).sort((a,b)=>a.n.localeCompare(b.n));

  content.innerHTML=`<div class="list">
${matches.map(a=>`
<div class="item announce">
<div class="toprow">
<div>${a.title}</div>
</div>
<div class="announceText">${a.text}</div>
</div>`).join("")}
${[...featured,...normal].map((d,i)=>`
<div class="item alt${(i%3)+1}">
<div class="toprow">
<div>${d.featured?"⭐ ":""}${d.n}</div>
<div>${d.p?`<a href="tel:${d.p}">${d.p}</a>`:""}</div>
</div>
<div class="addr">${d.a?`<a href="${mapLink(d.a)}" target="_blank" rel="noopener noreferrer">${d.a}</a>`:""}</div>
${d.w?`<div class="web"><a href="${d.w}" target="_blank" rel="noopener noreferrer">${shortUrl(d.w)}</a></div>`:""}
</div>`).join("")}
</div>`;
}

search.oninput=()=>{
  let q=search.value.toLowerCase().trim();
  if(!q){
    if(currentView.level===2){openList(currentView.cat,currentView.sub);return;}
    if(currentView.level===1&&currentView.cat){
      if(subcatDefs[currentView.cat]){openCat(currentView.cat);return;}
      openList(currentView.cat);return;
    }
    renderHome();
    return;
  }

  let data=places.filter(p=>p.n.toLowerCase().includes(q));
  currentView={level:1,cat:null,sub:null};
  openList("",null,data);
};

buildZipUI();
renderHome();
